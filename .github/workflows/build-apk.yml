name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
        build-tools-version: '36.0.0'
    
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    
    - name: Expo prebuild
      run: npx expo@latest prebuild --clean --platform android --no-install
    
    - name: Build APK
      run: |
        cd android
        ./gradlew app:assembleDebug --parallel --max-workers=4
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-scooter-manager-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: android/app/build/outputs/apk/debug/app-debug.apk
        asset_name: xiaomi-scooter-manager.apk
        asset_content_type: application/vnd.android.package-archive
